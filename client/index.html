<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Traffic</title>
		<link rel="stylesheet" href="index.css">
		<link rel="stylesheet" href="lightSizeEditor.css">
	</head>
	<body>
		<canvas id="gameCanvas"></canvas>
		
		<div id="gameView" class="hidden">
			<div id="fps"></div>
			<div id="mousePos"></div>
			<div id="timeLeft"></div>
			<div id="score"></div>
			<div id="pause" class="inPause"></div>
			<div id="zoomContainer" class="hidden">
				<div id="zoomInc"></div>
				<div id="zoomDec"></div>
			</div>
			<div id="restart"></div>
			<div id="lightTurn">00</div>
			<div id="handPanel"></div>
		</div>

		<div id="lightSelector" class="hidden">
				<div class="ls-panel">
					<div class="ls-row">
						<label>Direction</label>
						<select id="ls-direction"></select>
					</div>
					<div class="ls-row">
						<label>Lumières</label>
						<div class="ls-dots"></div>
					</div>
					<div class="ts-actions">
						<button id="ls-cancel">Annuler</button>
						<button id="ls-ok" class="ts-ok">OK</button>
					</div>
				</div>
			</div>

		<script>
			window.IMG_ROOT_PATH = "";
			window.DEBUG = true;
			window.SLOW_FPS = false;
			window.WASM_PATH = "../public/api/api";

			import("/index.ts").then(m => {m.startGame()});
		</script>
	</body>
</html>
